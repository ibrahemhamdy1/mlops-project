# DVC pipeline — declarative, reproducible stages with cached outputs.
# `dvc repro` re-runs only the stages whose inputs changed.
# Add a remote (e.g. `dvc remote add -d s3 s3://bucket/dvc`) to version
# data and models in object storage; the pipeline definition stays the same.
stages:
  validate:
    cmd: python src/validate_data.py
    deps:
      - src/validate_data.py

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - src/validate_data.py
    outs:
      - model/model.pkl
      - model/reference_data.csv
      - model/reference_stats.json
    metrics:
      - model/metrics.json:
          cache: false

  evaluate:
    cmd: python src/gate.py --new model/metrics.json
    deps:
      - src/gate.py
      - model/metrics.json
