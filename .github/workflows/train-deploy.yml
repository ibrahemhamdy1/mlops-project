# ==============================================================
# MLOps pipeline:
#   validate data -> train -> evaluation gate -> build image
#   -> image scan -> SBOM -> sign (cosign keyless) -> push GHCR
#   -> release (new production baseline) -> deploy (manual gate)
#
# The production "model registry" here is GitHub Releases:
# each release carries model.pkl + metrics.json + reference_stats.json.
# Swap for MLflow/SageMaker Registry in a real platform — the
# pipeline shape stays identical.
# ==============================================================
name: train-deploy

on:
  push:
    branches: [main]
    paths: [src/**, requirements.txt, Dockerfile, .github/workflows/train-deploy.yml]
  workflow_dispatch:        # manual retrain
  repository_dispatch:
    types: [drift-detected] # triggered by the drift workflow

permissions:
  contents: write    # create releases (model registry)
  packages: write    # push to GHCR
  id-token: write    # cosign keyless signing (and AWS OIDC if added)

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---------- 1. data validation gate ----------
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements.txt
      - name: Validate dataset (schema, nulls, ranges, volume)
        run: python src/validate_data.py

  # ---------- 2. training ----------
  train:
    needs: validate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements.txt
      - name: "Train model (MLflow tracking + lineage)"
        run: python src/train.py
      - name: Generate model card (governance artifact)
        run: python src/model_card.py
      - uses: actions/upload-artifact@v4
        with:
          name: model
          path: model/
          retention-days: 30
      - name: Upload MLflow runs (experiment tracking artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          retention-days: 30

  # ---------- 3. evaluation gate ----------
  evaluate-gate:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: model, path: model }
      - name: Fetch current production baseline (latest release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p baseline
          if gh release download --pattern metrics.json --dir baseline 2>/dev/null; then
            echo "baseline found"
          else
            echo "no previous release — first run"
          fi
      - name: Gate — candidate must beat production baseline
        run: |
          python src/gate.py \
            --new model/metrics.json \
            --baseline baseline/metrics.json \
            --min-auc 0.95 --tolerance 0.005

  # ---------- 4. build, scan, sign, push ----------
  build-sign-push:
    needs: evaluate-gate
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: model, path: model }

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (model baked in — reproducible artifact)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan — fail on CRITICAL
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Generate SBOM (supply-chain inventory)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC identity)
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}

      - name: Attest SBOM to the image
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json --type spdxjson \
            ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}

  # ---------- 5. promote: new production baseline ----------
  release:
    needs: build-sign-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: model, path: model }
      - name: Create release (model registry entry + new baseline)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="model-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          gh release create "$TAG" \
            model/model.pkl model/metrics.json model/reference_stats.json \
            model/reference_data.csv model/MODEL_CARD.md \
            --title "$TAG" \
            --notes "image: ${{ env.IMAGE }}@${{ needs.build-sign-push.outputs.digest }}"

  # ---------- 6. deploy (manual approval via environment) ----------
  deploy:
    needs: [build-sign-push, release]
    runs-on: ubuntu-latest
    environment: production   # configure required reviewers in repo settings
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Deploy by immutable digest (never by tag)
        run: |
          DIGEST="${{ needs.build-sign-push.outputs.digest }}"
          sed "s|ghcr.io/OWNER/REPO:latest|${{ env.IMAGE }}@${DIGEST}|" \
            k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/ml-inference --timeout=180s
      - name: Rollback on failed rollout
        if: failure()
        run: kubectl rollout undo deployment/ml-inference
